<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful and interactive GitHub Profile Search application.">
    <title>GitHub Profile Search</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>GitHub Profile Search</h1>
        </header>
        
        <form class="search-form" id="search-form">
            <input type="text" id="search" placeholder="Search a GitHub User..." autocomplete="off" class="search-input">
            <button type="submit" class="search-btn">Search</button>
        </form>

        <div id="main-content" class="main-content">
            <!-- Card will be rendered here dynamically -->
        </div>
    </main>
    
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
